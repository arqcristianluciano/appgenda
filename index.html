<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script src="https://accounts.google.com/gsi/client" async></script>
    <meta name="theme-color" content="#1C1A17" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="APPgenda" />
    <title>APPgenda</title>
    <script>
      (function(){
        var p = new URLSearchParams(location.search);
        if (p.has('clear')) {
          document.body && (document.body.innerHTML = '<p style="font-family:system-ui;padding:2rem">Limpiando caché y sesión…</p>');
          try {
            localStorage.removeItem('app_session');
            Object.keys(localStorage).forEach(function(k){
              if (k.indexOf('sb-') === 0 || k.indexOf('supabase') >= 0) localStorage.removeItem(k);
            });
          } catch (e) {}
          var done = function(){ location.replace('/'); };
          var jobs = [];
          if ('serviceWorker' in navigator) {
            jobs.push(navigator.serviceWorker.getRegistrations().then(function(rs){
              return Promise.all(rs.map(function(r){ return r.unregister(); }));
            }));
          }
          if ('caches' in window) {
            jobs.push(caches.keys().then(function(ks){
              return Promise.all(ks.map(function(k){ return caches.delete(k); }));
            }));
          }
          Promise.all(jobs).then(done, done);
          return;
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(r){
            r.forEach(function(reg){
              reg.update();
              if (reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
            });
          });
          navigator.serviceWorker.addEventListener('controllerchange', function(){ location.reload(); });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
