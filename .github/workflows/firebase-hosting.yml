name: Deploy to Firebase
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: cristian-apps
          SENTRY_PROJECT: appgenda

      - name: Install functions deps
        if: github.event_name != 'pull_request'
        working-directory: functions
        run: npm install

      - name: Build functions
        if: github.event_name != 'pull_request'
        working-directory: functions
        run: npm run build

      - name: Deploy preview channel (PR)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_APPGENDA_RD_AD765 }}
          projectId: appgenda-rd-ad765
          expires: 7d

      - name: Auth with service account
        if: github.event_name != 'pull_request'
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_APPGENDA_RD_AD765 }}' > /tmp/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json" >> $GITHUB_ENV

      # Targets desplegados por separado: un fallo de functions (p. ej. IAM/Eventarc
      # de los triggers v2) no debe abortar el deploy de hosting/firestore, que es
      # lo crítico para el cliente y las reglas. functions queda al final.
      - name: Deploy hosting
        if: github.event_name != 'pull_request'
        run: npx firebase-tools@latest deploy --only "hosting" --project appgenda-rd-ad765 --non-interactive --force

      - name: Deploy firestore (rules + indexes)
        if: github.event_name != 'pull_request'
        run: npx firebase-tools@latest deploy --only "firestore" --project appgenda-rd-ad765 --non-interactive --force

      - name: Deploy functions
        if: github.event_name != 'pull_request'
        run: npx firebase-tools@latest deploy --only "functions" --project appgenda-rd-ad765 --non-interactive --force

# Trigger rerun with updated workflow permissions
