name: Regenerate lockfile sentry-source-maps
on:
  workflow_dispatch:

jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/sentry-source-maps
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerate lockfile
        run: npm install --package-lock-only
      - name: Remove temp workflow
        run: rm -f .github/workflows/regen-lockfile-sm.yml
      - name: Commit lockfile and self-destruct
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json .github/workflows/regen-lockfile-sm.yml
          git diff --cached --quiet || git commit -m "chore: regen lockfile + remove temp workflow"
          git push origin feat/sentry-source-maps
