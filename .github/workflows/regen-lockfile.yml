name: Regenerate lockfile
on:
  workflow_dispatch:

jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/sentry-integration
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerate package-lock.json
        run: npm install --package-lock-only --ignore-scripts
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git diff --cached --quiet || git commit -m 'chore(sentry): regenerate package-lock.json'
          git push
      - name: Self-destruct workflow
        run: |
          git rm .github/workflows/regen-lockfile.yml
          git commit -m 'chore: remove temporary regen-lockfile workflow'
          git push
