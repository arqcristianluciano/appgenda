<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2B5E3E"/>
      <stop offset="100%" stop-color="#0F0F0F"/>
    </linearGradient>
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7FD4A4"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Fondo con esquinas redondeadas -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Cuerpo del calendario -->
  <rect x="108" y="148" width="296" height="248" rx="24" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="18"/>

  <!-- Barra superior del calendario -->
  <rect x="108" y="148" width="296" height="72" rx="24" fill="rgba(255,255,255,0.10)"/>
  <!-- Recorte inferior de la barra (para esquinas rectas abajo) -->
  <rect x="108" y="196" width="296" height="24" fill="rgba(255,255,255,0.10)"/>

  <!-- Ganchos del calendario -->
  <line x1="188" y1="112" x2="188" y2="178" stroke="rgba(255,255,255,0.55)" stroke-width="18" stroke-linecap="round"/>
  <line x1="324" y1="112" x2="324" y2="178" stroke="rgba(255,255,255,0.55)" stroke-width="18" stroke-linecap="round"/>

  <!-- Líneas decorativas (renglones del calendario) -->
  <line x1="148" y1="310" x2="270" y2="310" stroke="rgba(255,255,255,0.12)" stroke-width="10" stroke-linecap="round"/>
  <line x1="148" y1="345" x2="230" y2="345" stroke="rgba(255,255,255,0.12)" stroke-width="10" stroke-linecap="round"/>

  <!-- Checkmark principal -->
  <polyline
    points="155,286 224,358 360,210"
    fill="none"
    stroke="url(#check)"
    stroke-width="34"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
